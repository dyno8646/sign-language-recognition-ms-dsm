# Phase 0 — BiLSTM baseline config

data:
  path: datasets/custom/keypoints
  words:
    - hello
    - thanks
    - yes
    - no
    - please
    - sorry
    - help
    - more
    - stop
    - good
    - bad
    - eat
    - drink
    - home
    - love
    - name
    - what
    - where
    - who
    - how
  sequences: 30
  sequence_length: 30

model:
  type: bilstm
  input_size: 258
  hidden_size: 128
  num_layers: 2
  num_classes: 20
  dropout: 0.5

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  val_split: 0.2
  device: auto   # auto | cpu | cuda

inference:
  confidence_threshold: 0.7
  device: auto

checkpoints:
  dir: checkpoints
  best_model: bilstm_best.pt
  label_encoder: label_encoder.pkl
